version: '3.8'

services:
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - DATABASE_URL=postgresql://swiftdeploy:swiftdeploy@postgres:5432/swiftdeploy
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=info
      - GRPC_PORT=50051
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - server_data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=swiftdeploy
      - POSTGRES_PASSWORD=swiftdeploy
      - POSTGRES_DB=swiftdeploy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftdeploy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@swiftdeploy.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  server_data:
